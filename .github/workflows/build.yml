name: Build Spider JAR

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease

      - name: Generate JAR
        run: |
          cd jar
          DIR="$(pwd)"
          APK="$DIR/../app/build/outputs/apk/release/app-release-unsigned.apk"
          OUT="$DIR/custom_spider.jar"
          MD5="$OUT.md5"

          if [ ! -f "$APK" ]; then
            echo "Missing APK: $APK"
            ls -la "$DIR/../app/build/outputs/apk/release/"
            exit 1
          fi

          rm -f "$OUT" "$MD5"

          echo "Extracting classes.dex from APK..."
          unzip -j "$APK" classes.dex -d "$DIR/"
          mv "$DIR/classes.dex" "$OUT"

          echo "=== Verifying JAR ==="
          echo "--- Spider classes ---"
          strings "$OUT" | grep "Lcom/github/catvod/spider/" | sort | uniq
          echo "--- Third-party libs ---"
          strings "$OUT" | grep "Lorg/jsoup/" | head -5
          strings "$OUT" | grep "Lokhttp3/" | head -5
          strings "$OUT" | grep "Lcom/google/gson/" | head -5
          echo "--- YueGuang ---"
          strings "$OUT" | grep "Lcom/github/catvod/spider/YueGuang;" && echo "✅ YueGuang FOUND" || echo "❌ YueGuang NOT FOUND"

          md5sum "$OUT" | awk '{print $1}' > "$MD5"

          echo "Done!"
          ls -lh "$OUT"

      - name: Commit and Push JAR to repo
        run: |
          echo "=== 提交 JAR 到仓库 ==="
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add jar/custom_spider.jar jar/custom_spider.jar.md5

          if git diff --cached --quiet; then
            echo "⚠️ JAR 没有变化，跳过提交"
          else
            git commit -m "chore: update custom_spider.jar [skip ci]"
            git push
            echo "✅ JAR 已提交到仓库"
          fi

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: custom_spider
          path: jar/custom_spider.jar
